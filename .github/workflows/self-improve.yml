name: Self-Improve Scan

on:
  schedule:
    # 19:00 UTC = 22:00 Israel time
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  self-improve:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Self-Improvement Scan
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL not set, skipping."
            exit 0
          fi

          echo "Triggering self-improvement scan..."
          curl -sf -X GET "$RENDER_URL/api/cron/self-improve" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 120
