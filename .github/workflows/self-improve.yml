name: Self-Improve Scan

on:
  schedule:
    # 19:00 UTC = 22:00 Israel time
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  self-improve:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL not set, skipping."
            exit 0
          fi
          echo "Waking up Render..."
          curl -s "$RENDER_URL/health" --max-time 60 || true
          sleep 10

      - name: Trigger Self-Improvement Scan
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering self-improvement scan..."
          response=$(curl -s -w "\n%{http_code}" -X GET "$RENDER_URL/api/cron/self-improve" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 300)

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP $http_code"
          echo "$body"

          if [ "$http_code" -ge 400 ]; then
            echo "Request failed with HTTP $http_code"
            exit 1
          fi
