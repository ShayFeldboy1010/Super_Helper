name: Learn Preferences
on:
  schedule:
    - cron: '0 17 * * 0'  # 17:00 UTC = 20:00 Israel (Sunday evening)
  workflow_dispatch:

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger preference learning
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL not set, skipping."
            exit 0
          fi

          echo "Running weekly preference learning..."
          curl -sf -X GET "$RENDER_URL/api/cron/learn-preferences" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 60
